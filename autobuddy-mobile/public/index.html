<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoBuddy - Ride Sharing App</title>
    <meta name="description" content="AutoBuddy - Your trusted ride-sharing companion">
    <meta name="theme-color" content="#0b7a29">
    <meta property="og:title" content="AutoBuddy">
    <meta property="og:description" content="AutoBuddy - Your trusted ride-sharing companion">
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="AutoBuddy">
    <link rel="apple-touch-icon" href="/logo.png">
    <link rel="icon" href="/favicon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #E9F7EC 0%, #F7FCF4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 18px;
            overflow: auto;
        }

        .launch-card {
            max-width: 1160px;
            width: min(1160px, 96vw);
            margin: 0 auto;
            padding: 16px;
            background: #ffffff;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 24px 60px rgba(0, 80, 40, 0.12);
        }

        .launch-image-box {
            width: 100%;
            margin: 0 auto 16px;
            border-radius: 18px;
            background: #ffffff;
            overflow: hidden;
        }

        .launch-image-box img {
            display: block;
            width: 100%;
            height: auto;
        }

        .primary-btn {
            width: min(360px, 100%);
            margin: 0 auto;
            padding: 14px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 900;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.2s ease;
            border: none;
            text-decoration: none;
            display: block;
        }

        .primary-btn {
            background: #0b7a29;
            color: white;
            margin-bottom: 10px;
        }

        .secondary-btn {
            width: min(360px, 100%);
            margin: 0 auto 10px;
            padding: 13px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 900;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.2s ease;
            border: 1px solid #b6d7c1;
            background: #f4fbf6;
            color: #0b7a29;
            display: block;
        }

        .secondary-btn[hidden] {
            display: none;
        }

        .primary-btn:hover {
            transform: translateY(-2px);
        }

        .secondary-btn:hover {
            transform: translateY(-2px);
        }

        .install-status {
            min-height: 20px;
            margin: 0 auto 8px;
            color: #315a3b;
            font-size: 13px;
            font-weight: 700;
            line-height: 1.35;
            width: min(420px, 100%);
        }

        .footer {
            margin-top: 12px;
            text-align: center;
            color: #6b7280;
            font-size: 12px;
        }

        @media (max-width: 600px) {
            .launch-card {
                padding: 10px;
                border-radius: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="launch-card">
        <div class="launch-image-box">
            <img src="/launch-image.jpg" alt="AutoBuddy launch preview" />
        </div>

        <a href="/app" class="primary-btn">Start Riding</a>
        <button id="installShortcutButton" class="secondary-btn" type="button" hidden>Install Shortcut</button>
        <div id="installStatus" class="install-status" aria-live="polite"></div>

        <div class="footer">
            &copy; 2026 AutoBuddy. All rights reserved.
        </div>
    </div>

    <script>
        let deferredInstallPrompt = null;
        let appRedirectTimer = null;
        const installButton = document.getElementById('installShortcutButton');
        const installStatus = document.getElementById('installStatus');

        function setInstallStatus(message) {
            if (installStatus) {
                installStatus.textContent = message || '';
            }
        }

        function isStandaloneLaunch() {
            return Boolean(
                window.matchMedia && window.matchMedia('(display-mode: standalone)').matches
            ) || Boolean(window.navigator && window.navigator.standalone);
        }

        function isIosDevice() {
            return /iphone|ipad|ipod/i.test(window.navigator.userAgent || '');
        }

        function showInstallButton() {
            if (installButton) {
                installButton.hidden = false;
            }
        }

        function scheduleAppRedirect(delayMs) {
            if (appRedirectTimer) {
                clearTimeout(appRedirectTimer);
            }
            appRedirectTimer = setTimeout(() => {
                window.location.href = '/app';
            }, delayMs);
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(() => null);
        }

        window.addEventListener('beforeinstallprompt', (event) => {
            event.preventDefault();
            deferredInstallPrompt = event;
            showInstallButton();
            setInstallStatus('Install AutoBuddy for one-tap access from this device.');
            scheduleAppRedirect(20000);
        });

        window.addEventListener('appinstalled', () => {
            deferredInstallPrompt = null;
            setInstallStatus('AutoBuddy shortcut installed.');
            if (installButton) {
                installButton.hidden = true;
            }
            scheduleAppRedirect(1200);
        });

        if (installButton) {
            installButton.addEventListener('click', async () => {
                if (deferredInstallPrompt) {
                    try {
                        await deferredInstallPrompt.prompt();
                        const choice = await deferredInstallPrompt.userChoice;
                        deferredInstallPrompt = null;
                        if (choice && choice.outcome === 'accepted') {
                            setInstallStatus('AutoBuddy install started.');
                            scheduleAppRedirect(1200);
                            return;
                        }
                        setInstallStatus('Install was dismissed. You can still open AutoBuddy now.');
                        scheduleAppRedirect(4000);
                        return;
                    } catch (_) {
                        setInstallStatus('Use your browser menu to install AutoBuddy.');
                    }
                } else if (isIosDevice()) {
                    setInstallStatus('On iPhone or iPad, tap Share, then Add to Home Screen.');
                } else {
                    setInstallStatus('Use your browser menu and choose Install App or Add to Home Screen.');
                }
                scheduleAppRedirect(6000);
            });
        }

        if (isStandaloneLaunch()) {
            setInstallStatus('AutoBuddy shortcut is ready.');
            scheduleAppRedirect(1200);
        } else if (isIosDevice()) {
            showInstallButton();
            setInstallStatus('Install AutoBuddy from the Share menu for one-tap access.');
        }

        window.setTimeout(() => {
            if (!isStandaloneLaunch() && !deferredInstallPrompt && !isIosDevice()) {
                showInstallButton();
                setInstallStatus('Install AutoBuddy from your browser menu for one-tap access.');
            }
        }, 1500);

        function resolveApiBaseUrl() {
            const host = window.location.hostname || '';
            if (host === 'localhost' || host === '127.0.0.1') {
                return 'http://127.0.0.1:8001/api';
            }
            if (host.endsWith('onrender.com')) {
                return `${window.location.origin}/api`;
            }
            return 'https://autobuddy-z1vx.onrender.com/api';
        }

        function readSessionUser() {
            try {
                const raw = localStorage.getItem('autobuddy_session_v1');
                if (!raw) {
                    return null;
                }
                const parsed = JSON.parse(raw);
                if (!parsed || typeof parsed !== 'object' || !parsed.user || typeof parsed.user !== 'object') {
                    return null;
                }
                return parsed.user;
            } catch (_) {
                return null;
            }
        }

        function buildLaunchPayload() {
            const user = readSessionUser();
            return {
                page_url: window.location.href,
                referrer: document.referrer || '',
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || '',
                language: navigator.language || '',
                platform: navigator.platform || '',
                screen_width: window.screen && window.screen.width ? Number(window.screen.width) : null,
                screen_height: window.screen && window.screen.height ? Number(window.screen.height) : null,
                device_memory_gb: typeof navigator.deviceMemory === 'number' ? Number(navigator.deviceMemory) : null,
                user_agent: navigator.userAgent || '',
                session_user_id: user && user.id ? user.id : null,
                session_name: user && user.name ? user.name : null,
                session_email: user && user.email ? user.email : null,
                session_phone: user && user.phone ? user.phone : null,
                session_role: user && user.role ? user.role : null
            };
        }

        async function recordLaunchVisit() {
            const endpoint = `${resolveApiBaseUrl()}/launch/visit`;
            const payload = buildLaunchPayload();
            try {
                await fetch(endpoint, {
                    method: 'POST',
                    mode: 'cors',
                    keepalive: true,
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
                return;
            } catch (_) {
                // Fallback to sendBeacon for browsers that block keepalive fetch in unload lifecycle.
            }

            try {
                const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
                if (navigator.sendBeacon) {
                    navigator.sendBeacon(endpoint, blob);
                }
            } catch (_) {
                // No-op fallback.
            }
        }

        recordLaunchVisit();

        if (!appRedirectTimer) {
            scheduleAppRedirect(10000);
        }
    </script>
</body>
</html>
