groups:
  - name: autobuddy_api_alerts
    interval: 30s
    rules:
      # High error rate
      - alert: HighErrorRate
        expr: |
          (
            rate(http_requests_total{status=~"5.."}[5m])
            /
            rate(http_requests_total[5m])
          ) * 100 > 5
        for: 5m
        labels:
          severity: critical
          service: autobuddy-backend
        annotations:
          summary: "High API error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%)"
          runbook_url: "https://docs.autobuddy.com/runbooks/high-error-rate"

      # High latency
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95,
            rate(http_request_duration_seconds_bucket[5m])
          ) > 2
        for: 10m
        labels:
          severity: warning
          service: autobuddy-backend
        annotations:
          summary: "API latency is high"
          description: "P95 latency is {{ $value }}s (threshold: 2s)"
          runbook_url: "https://docs.autobuddy.com/runbooks/high-latency"

      # Database connection failures
      - alert: DatabaseConnectionFailure
        expr: |
          rate(database_operations_total{status="error"}[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
          service: autobuddy-backend
        annotations:
          summary: "Database connection issues detected"
          description: "Database error rate: {{ $value | humanize }} errors/sec"
          runbook_url: "https://docs.autobuddy.com/runbooks/database-errors"

      # No available drivers
      - alert: NoAvailableDrivers
        expr: available_drivers_total < 5
        for: 15m
        labels:
          severity: warning
          service: autobuddy-backend
        annotations:
          summary: "Very few drivers available"
          description: "Only {{ $value }} drivers available (threshold: 5)"
          runbook_url: "https://docs.autobuddy.com/runbooks/driver-shortage"

      # Payment failures
      - alert: HighPaymentFailureRate
        expr: |
          (
            rate(payment_transactions_total{status="failed"}[10m])
            /
            rate(payment_transactions_total[10m])
          ) * 100 > 10
        for: 5m
        labels:
          severity: critical
          service: autobuddy-backend
        annotations:
          summary: "High payment failure rate"
          description: "Payment failure rate: {{ $value | humanizePercentage }}"
          runbook_url: "https://docs.autobuddy.com/runbooks/payment-failures"

  - name: autobuddy_system_alerts
    interval: 30s
    rules:
      # High CPU usage
      - alert: HighCPUUsage
        expr: system_cpu_usage_percent > 80
        for: 10m
        labels:
          severity: warning
          service: autobuddy-backend
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value }}% (threshold: 80%)"
          runbook_url: "https://docs.autobuddy.com/runbooks/high-cpu"

      # Critical CPU usage
      - alert: CriticalCPUUsage
        expr: system_cpu_usage_percent > 95
        for: 5m
        labels:
          severity: critical
          service: autobuddy-backend
        annotations:
          summary: "Critical CPU usage"
          description: "CPU usage is {{ $value }}% (threshold: 95%)"
          runbook_url: "https://docs.autobuddy.com/runbooks/critical-cpu"

      # High memory usage
      - alert: HighMemoryUsage
        expr: system_memory_usage_percent > 85
        for: 10m
        labels:
          severity: warning
          service: autobuddy-backend
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value }}% (threshold: 85%)"
          runbook_url: "https://docs.autobuddy.com/runbooks/high-memory"

      # Critical memory usage
      - alert: CriticalMemoryUsage
        expr: system_memory_usage_percent > 95
        for: 5m
        labels:
          severity: critical
          service: autobuddy-backend
        annotations:
          summary: "Critical memory usage"
          description: "Memory usage is {{ $value }}% (threshold: 95%)"
          runbook_url: "https://docs.autobuddy.com/runbooks/critical-memory"

      # High disk usage
      - alert: HighDiskUsage
        expr: system_disk_usage_percent > 80
        for: 30m
        labels:
          severity: warning
          service: autobuddy-backend
        annotations:
          summary: "High disk usage"
          description: "Disk usage is {{ $value }}% (threshold: 80%)"
          runbook_url: "https://docs.autobuddy.com/runbooks/high-disk"

      # Critical disk usage
      - alert: CriticalDiskUsage
        expr: system_disk_usage_percent > 90
        for: 10m
        labels:
          severity: critical
          service: autobuddy-backend
        annotations:
          summary: "Critical disk usage"
          description: "Disk usage is {{ $value }}% (threshold: 90%)"
          runbook_url: "https://docs.autobuddy.com/runbooks/critical-disk"

  - name: autobuddy_business_alerts
    interval: 1m
    rules:
      # Surge in cancellations
      - alert: HighCancellationRate
        expr: |
          (
            sum(rate(rides_by_status{status="cancelled"}[10m]))
            /
            sum(rate(rides_by_status[10m]))
          ) * 100 > 20
        for: 15m
        labels:
          severity: warning
          service: autobuddy-backend
        annotations:
          summary: "High ride cancellation rate"
          description: "Cancellation rate: {{ $value | humanizePercentage }}"
          runbook_url: "https://docs.autobuddy.com/runbooks/high-cancellations"

      # No new rides
      - alert: NoNewRides
        expr: |
          rate(rides_by_status{status="pending"}[30m]) == 0
        for: 30m
        labels:
          severity: warning
          service: autobuddy-backend
        annotations:
          summary: "No new ride requests"
          description: "No new rides in the last 30 minutes"
          runbook_url: "https://docs.autobuddy.com/runbooks/no-rides"

      # External API failures
      - alert: ExternalAPIFailures
        expr: |
          rate(external_api_calls_total{status="error"}[5m]) > 0.5
        for: 5m
        labels:
          severity: warning
          service: autobuddy-backend
        annotations:
          summary: "External API calls failing"
          description: "{{ $labels.service }} API error rate: {{ $value }} errors/sec"
          runbook_url: "https://docs.autobuddy.com/runbooks/external-api-failures"
