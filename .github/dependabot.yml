version: 2

updates:
  # ============================================================================
  # Python Dependencies
  # ============================================================================
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    reviewers:
      - "dev-team"
    assignees:
      - "dev-team"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps):"
      prefix-development: "chore(deps-dev):"
      include: "scope"
    pull-request-branch-name:
      separator: "/"
    rebase-strategy: "auto"
    allow:
      - dependency-type: "production"
      - dependency-type: "development"
    ignore:
      # Specify dependencies to ignore (optional)
      # - dependency-name: "some-package"
    open-pull-requests-limit: 5
    versioning-strategy: "auto"

  # ============================================================================
  # npm Dependencies (Frontend)
  # ============================================================================
  - package-ecosystem: "npm"
    directory: "/autobuddy-mobile"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    reviewers:
      - "dev-team"
    assignees:
      - "dev-team"
    labels:
      - "dependencies"
      - "javascript"
      - "react-native"
    commit-message:
      prefix: "chore(deps):"
      prefix-development: "chore(deps-dev):"
      include: "scope"
    pull-request-branch-name:
      separator: "/"
    rebase-strategy: "auto"
    allow:
      - dependency-type: "production"
      - dependency-type: "development"
    open-pull-requests-limit: 5
    versioning-strategy: "auto"

  # ============================================================================
  # Docker (base images)
  # ============================================================================
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    reviewers:
      - "ops-team"
    labels:
      - "dependencies"
      - "docker"
      - "infrastructure"
    commit-message:
      prefix: "chore(docker):"
      include: "scope"

  # ============================================================================
  # GitHub Actions
  # ============================================================================
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "02:00"
    reviewers:
      - "ops-team"
    labels:
      - "ci-cd"
      - "github-actions"
    commit-message:
      prefix: "chore(ci):"
      include: "scope"
    open-pull-requests-limit: 3
