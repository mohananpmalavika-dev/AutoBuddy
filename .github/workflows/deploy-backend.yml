name: Backend CI / Build, Push & Deploy to Render

on:
  push:
    branches: [ main, master ]
    paths:
      - 'backend/**'
      - 'backend/requirements.txt'
      - '.github/workflows/deploy-backend.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image to GHCR
        uses: docker/build-push-action@v4
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/autobuddy-backend:latest
            ghcr.io/${{ github.repository_owner }}/autobuddy-backend:${{ github.sha }}

      - name: Log in to Docker Hub
        if: secrets.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image to Docker Hub
        if: secrets.DOCKERHUB_USERNAME != ''
        uses: docker/build-push-action@v4
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/autobuddy-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/autobuddy-backend:${{ github.sha }}

  deploy-render:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: secrets.RENDER_DEPLOY_URL != ''
    
    steps:
      - name: Deploy to Render
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "clear"}'
