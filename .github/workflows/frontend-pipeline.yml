name: Frontend CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'autobuddy-mobile/**'
      - '.github/workflows/frontend-pipeline.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'autobuddy-mobile/**'
  workflow_dispatch:

jobs:
  # ============================================================================
  # Lint & Format Check
  # ============================================================================
  lint:
    runs-on: ubuntu-latest
    name: Lint & Format Check

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'autobuddy-mobile/package-lock.json'

      - name: Install dependencies
        working-directory: autobuddy-mobile
        run: npm ci

      - name: Run ESLint
        working-directory: autobuddy-mobile
        run: npm run lint

      - name: Check code formatting
        working-directory: autobuddy-mobile
        run: npm run format:check || true

  # ============================================================================
  # Type Check (TypeScript)
  # ============================================================================
  type-check:
    runs-on: ubuntu-latest
    name: TypeScript Type Check
    needs: lint

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'autobuddy-mobile/package-lock.json'

      - name: Install dependencies
        working-directory: autobuddy-mobile
        run: npm ci

      - name: Type check with TypeScript
        working-directory: autobuddy-mobile
        run: npx tsc --noEmit

  # ============================================================================
  # Unit & Component Tests
  # ============================================================================
  test:
    runs-on: ubuntu-latest
    name: Unit & Component Tests
    needs: lint

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'autobuddy-mobile/package-lock.json'

      - name: Install dependencies
        working-directory: autobuddy-mobile
        run: npm ci

      - name: Run Jest tests
        working-directory: autobuddy-mobile
        run: npm test -- --coverage --coverageReporters=json-summary --coverageReporters=lcov

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./autobuddy-mobile/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: jest-results
          path: autobuddy-mobile/coverage/

  # ============================================================================
  # Build Web App
  # ============================================================================
  build-web:
    runs-on: ubuntu-latest
    name: Build Web App
    needs: [lint, type-check, test]

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'autobuddy-mobile/package-lock.json'

      - name: Install dependencies
        working-directory: autobuddy-mobile
        run: npm ci

      - name: Build web app
        working-directory: autobuddy-mobile
        run: npm run export:web

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: web-build
          path: autobuddy-mobile/dist/
          retention-days: 5

  # ============================================================================
  # Web Build Smoke Check
  # ============================================================================
  e2e:
    runs-on: ubuntu-latest
    name: Web Build Smoke Check
    needs: build-web

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'autobuddy-mobile/package-lock.json'

      - name: Install dependencies
        working-directory: autobuddy-mobile
        run: npm ci

      - name: Download web build
        uses: actions/download-artifact@v3
        with:
          name: web-build
          path: autobuddy-mobile/dist/

      - name: Verify web build artifact
        working-directory: autobuddy-mobile
        run: test -f dist/app/index.html && test -d dist/_expo/static/js/web

  # ============================================================================
  # Build Mobile App
  # ============================================================================
  build-mobile:
    runs-on: ubuntu-latest
    name: Build Mobile App
    needs: [lint, type-check, test]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'autobuddy-mobile/package-lock.json'

      - name: Install dependencies
        working-directory: autobuddy-mobile
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build APK with EAS
        working-directory: autobuddy-mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform android --output ./app.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v3
        with:
          name: mobile-apk
          path: autobuddy-mobile/app.apk
          retention-days: 30

  # ============================================================================
  # Deploy Web to Vercel
  # ============================================================================
  deploy-web:
    runs-on: ubuntu-latest
    name: Deploy Web App
    needs: [build-web, e2e]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v3

      - name: Download web build
        uses: actions/download-artifact@v3
        with:
          name: web-build
          path: autobuddy-mobile/dist/

      - name: Deploy to Vercel (Production)
        if: github.ref == 'refs/heads/main'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: autobuddy-mobile
          scope: ${{ secrets.VERCEL_ORG_ID }}
          vercel-args: '--prod'

      - name: Deploy to Vercel (Preview)
        if: github.ref == 'refs/heads/develop'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: autobuddy-mobile
          scope: ${{ secrets.VERCEL_ORG_ID }}

      - name: Comment PR with Vercel preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 [Vercel Preview](https://vercel.com/dashboard) is ready!\n\nPreview URL: https://${{ steps.deploy.outputs.preview_url }}'
            });

  # ============================================================================
  # Code Quality Analysis
  # ============================================================================
  code-quality:
    runs-on: ubuntu-latest
    name: Code Quality Analysis
    needs: lint

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'autobuddy-mobile/package-lock.json'

      - name: Install dependencies
        working-directory: autobuddy-mobile
        run: npm ci

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=autobuddy-frontend
            -Dsonar.sources=autobuddy-mobile/src

      - name: Check SonarCloud quality gate
        uses: sonarsource/sonarcloud-github-c-cpp@master
        if: always()

  # ============================================================================
  # Notify on Completion
  # ============================================================================
  notify:
    runs-on: ubuntu-latest
    name: Notify Build Status
    needs: [build-web, deploy-web]
    if: always()

    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "Frontend Build: ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Frontend Build* - ${{ job.status }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* ${{ github.sha }}\n*Author:* ${{ github.actor }}"
                  }
                }
              ]
            }
