name: Backend CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'backend/**'
      - '.github/workflows/backend-pipeline.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'backend/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  # ============================================================================
  # Lint & Format Check
  # ============================================================================
  lint:
    runs-on: ubuntu-latest
    name: Lint & Format Check
    
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pylint flake8 black isort

      - name: Lint with Pylint
        run: |
          cd backend
          pylint app/ --disable=R,C --fail-under=8.0 || true

      - name: Check formatting with Black
        run: |
          cd backend
          black --check app/ || true

      - name: Check import sorting with isort
        run: |
          cd backend
          isort --check-only app/ || true

      - name: Lint with Flake8
        run: |
          cd backend
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics

  # ============================================================================
  # Unit & Integration Tests
  # ============================================================================
  test:
    runs-on: ubuntu-latest
    name: Unit & Integration Tests
    needs: lint
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: autobuddy_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      mongodb:
        image: mongo:6
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Set up environment
        run: |
          cat > backend/.env.test << EOF
          MONGO_URL=mongodb://localhost:27017/autobuddy_test
          FEATURE_DATABASE_URL=postgresql://postgres:test_password@localhost:5432/autobuddy_test
          REDIS_URL=redis://localhost:6379/0
          JWT_SECRET=test_secret_key_do_not_use_in_production
          STRIPE_API_KEY=sk_test_placeholder
          AWS_ACCESS_KEY_ID=test_access_key
          AWS_SECRET_ACCESS_KEY=test_secret_key
          AWS_REGION=us-east-1
          AWS_S3_BUCKET=autobuddy-test
          SENTRY_DSN=""
          EOF

      - name: Run database migrations
        run: |
          cd backend
          python scripts/add_production_indexes.py --test || true

      - name: Run tests with coverage
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: backend/test-results/

  # ============================================================================
  # Security Scanning
  # ============================================================================
  security:
    runs-on: ubuntu-latest
    name: Security Scanning
    needs: lint

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install security tools
        run: |
          pip install bandit safety

      - name: Run Bandit security scan
        run: |
          cd backend
          bandit -r app/ -f json -o bandit-report.json || true
          bandit -r app/

      - name: Check dependencies for vulnerabilities
        run: |
          pip install -r backend/requirements.txt
          safety check --json || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v3
        with:
          name: security-reports
          path: backend/bandit-report.json

  # ============================================================================
  # Build Docker Image
  # ============================================================================
  build:
    runs-on: ubuntu-latest
    name: Build Docker Image
    needs: [test, security]
    if: github.event_name == 'push'
    
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # Deploy to Staging
  # ============================================================================
  deploy-staging:
    runs-on: ubuntu-latest
    name: Deploy to Staging
    needs: build
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Fly.io Staging
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          curl -L https://fly.io/install.sh | sh
          export PATH="$HOME/.fly/bin:$PATH"
          flyctl auth token $FLY_API_TOKEN
          flyctl deploy --app autobuddy-backend-staging --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-${{ github.sha }}

      - name: Run smoke tests
        run: |
          bash scripts/smoke-tests.sh https://staging-api.autobuddy.app

  # ============================================================================
  # Deploy to Production
  # ============================================================================
  deploy-production:
    runs-on: ubuntu-latest
    name: Deploy to Production
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://api.autobuddy.app

    steps:
      - uses: actions/checkout@v3

      - name: Create deployment
        uses: actions/github-script@v6
        id: deployment
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production',
              required_contexts: [],
              auto_merge: false
            });
            return deployment.data.id;

      - name: Deploy to Fly.io Production
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          curl -L https://fly.io/install.sh | sh
          export PATH="$HOME/.fly/bin:$PATH"
          flyctl auth token $FLY_API_TOKEN
          flyctl deploy --app autobuddy-backend --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Run production tests
        run: |
          bash scripts/smoke-tests.sh https://api.autobuddy.app

      - name: Update deployment status
        uses: actions/github-script@v6
        if: always()
        with:
          script: |
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure';
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.result }},
              state: state,
              environment_url: 'https://api.autobuddy.app',
              description: 'Deployment ' + state
            });

      - name: Notify Slack on deployment
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_PROD }}
          payload: |
            {
              "text": "Backend Production Deployment: ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Backend Production Deployment* - ${{ job.status }}\n*Commit:* ${{ github.sha }}\n*Author:* ${{ github.actor }}"
                  }
                }
              ]
            }
