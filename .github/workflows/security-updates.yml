name: Dependency & Security Updates

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  # ============================================================================
  # Dependabot Updates
  # ============================================================================
  dependabot:
    runs-on: ubuntu-latest
    name: Check Dependabot Status
    if: github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v3

      - name: Enable Dependabot
        run: |
          echo "Dependabot is configured via .github/dependabot.yml"

  # ============================================================================
  # Security Advisory Check
  # ============================================================================
  security-check:
    runs-on: ubuntu-latest
    name: Security Advisory Check

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Check Python dependencies for advisories
        run: |
          pip install safety
          pip install -r backend/requirements.txt
          safety check --json > backend-safety-report.json || true

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'autobuddy-mobile/package-lock.json'

      - name: Check npm dependencies for advisories
        working-directory: autobuddy-mobile
        run: |
          npm audit --json > npm-audit-report.json || true
          npm audit --production

      - name: Upload reports
        uses: actions/upload-artifact@v3
        with:
          name: security-reports
          path: |
            backend-safety-report.json
            autobuddy-mobile/npm-audit-report.json

      - name: Create security report issue
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔒 Security Advisory - Dependencies Update Required',
              labels: ['security', 'dependencies'],
              body: '⚠️ Vulnerabilities detected in dependencies. Run `npm audit` and `safety check` to view details.'
            });

  # ============================================================================
  # Update License Compliance
  # ============================================================================
  license-check:
    runs-on: ubuntu-latest
    name: License Compliance Check

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'autobuddy-mobile/package-lock.json'

      - name: Install license-report tool
        run: npm install -g license-report

      - name: Generate frontend license report
        working-directory: autobuddy-mobile
        run: |
          license-report --output json > licenses.json || true
          license-report --output csv > licenses.csv || true

      - name: Check for problematic licenses
        run: |
          # Check for GPL licenses (if not desired)
          grep -i "GPL" autobuddy-mobile/licenses.csv && echo "⚠️ GPL license detected" || echo "✓ No GPL licenses"

      - name: Upload license reports
        uses: actions/upload-artifact@v3
        with:
          name: license-reports
          path: autobuddy-mobile/licenses.*

  # ============================================================================
  # Dependency Graph Update
  # ============================================================================
  dependency-graph:
    runs-on: ubuntu-latest
    name: Update Dependency Graph

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v3

      - name: Publish Python dependency graph
        uses: advanced-security/pythonpublishdeps@main
        with:
          directory: backend

      - name: Publish Node.js dependency graph
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'autobuddy-mobile/package-lock.json'

  # ============================================================================
  # Create Summary Report
  # ============================================================================
  summary:
    runs-on: ubuntu-latest
    name: Generate Summary Report
    needs: [security-check, license-check]
    if: always()

    steps:
      - uses: actions/checkout@v3

      - name: Download all reports
        uses: actions/download-artifact@v3

      - name: Generate summary
        run: |
          cat > security-summary.md << 'EOF'
          # Security & Dependency Report
          
          Generated: $(date)
          
          ## Python Dependencies
          See: `backend-safety-report.json`
          
          ## Node.js Dependencies
          See: `npm-audit-report.json`
          
          ## License Compliance
          See: `licenses.csv`
          
          ## Actions
          - [ ] Review security advisories
          - [ ] Update vulnerable dependencies
          - [ ] Test changes thoroughly
          - [ ] Merge security patches
          
          EOF

      - name: Create or update PR
        uses: actions/github-script@v6
        if: github.event_name == 'schedule'
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('security-summary.md', 'utf8');
            
            // Check if PR exists
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['dependencies', 'automated']
            });
            
            if (prs.data.length === 0) {
              // Create new PR
              const branch = `security/dependencies-${Date.now()}`;
              github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/heads/${branch}`,
                sha: context.sha
              });
              
              github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🔒 Security & Dependency Updates',
                head: branch,
                base: 'develop',
                body: summary,
                labels: ['dependencies', 'automated', 'security']
              });
            }

  # ============================================================================
  # Notify Team
  # ============================================================================
  notify:
    runs-on: ubuntu-latest
    name: Notify Security Team
    needs: [security-check, license-check]
    if: always()

    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_SECURITY }}
          payload: |
            {
              "text": "Daily Security Check",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Daily Security & Dependency Check*\n*Status:* ${{ job.status }}\n\nCheck details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
